<html>
    <head>
        <title>Tiêu đề trang</title>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background-color: #f5f5f5;
            }
        </style>
    </head>
    <body>
        <div style="width: 500px; padding: 20px; border: 1px solid #ccc; background-color: white; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);">
        <form
            action="process_login.html"
            method="get"
            name="loginForm">
            <table border="0">
                <tr>
                    <td rowspan="7">
                        <img src="images/user-setting.png"
                        alt="Admin Page"
                        width="150" height="250">
                    </td>
                </tr>
                <tr>
                    <td style="text-align: center; font: size 24px; font-weight: bold;">
                        Login System
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="username">
                        User Name:
                        </label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="text" name="username" id="username" value="obama" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="password">
                        Password:
                        </label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="password" name="password" id="password" value="123456" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="remember">
                        <input type="checkbox" name="remember" id="remember" value="remember">
                        Remember me
                        </label>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <input type="submit" value="Login" style="background-image: url(images/login.png);">
                        |
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>
        </div>
    </body>
</html>
