<html>
    <head>
        <title>Tiêu đề trang</title>
    </head>
    <body>
    <form name="colorForm">
        <h3>Select background color:</h3>
        <select id="colorSelect" name="colorSelect" size="5" onchange="colorForm.selectedColor.value = this.value; colorForm.selectedColor.style.backgroundColor = this.value;">
            <option value="lightcoral">Light Coral</option>
            <option value="lightyellow">Light Yellow</option>
            <option value="lightblue">Light Blue</option>
            <option value="lightgreen">Light Green</option>
            <option value="lightpink">Light Pink</option>
        </select>
        <p>Your selected color is:</p>
        <input type="text" id="selectedColor" name="selectedColor">
    </form>
    <form name="imgForm">
        <h3>Select an image:</h3>
        <select id="imgSelect" name="imgSelect" size="5" onchange="document.getElementById('selectedImage').src = 'images/' + this.value;">
            <option value="logo_uel.png">Logo UEL</option>
            <option value="logo_vnu.png">Logo VNU</option>
            <option value="myavatar.png">My Avatar</option>
        </select>
        <p>Your selected image is:</p>
        <img id="selectedImage" name="selectedImage" alt="No Image Selected"
        style="width: 200px; height: 200px;">
    </form>
    </body>
</html>
