<html>
    <head>
        <title>Tiêu đề trang</title>
        <script>
            function saveCustomerInfo()
            {
                var customer_name = document.getElementById("customer_name").value;
                var customer_address = document.getElementById("customer_address").value;
                var customer_phone = document.getElementById("customer_phone").value;
                var customer_email = document.getElementById("customer_email").value;
                var dob_day = document.getElementById("dob_day").value;
                var dob_month = document.getElementById("dob_month").value;
                var dob_year = document.getElementById("dob_year").value;
                var customer_info = "Customer Name: " + customer_name + "<br/>" +
                                    "Address: " + customer_address + "<br/>" +
                                    "Phone Number: " + customer_phone + "<br/>" +
                                    "Email: " + customer_email + "<br/>" +
                                    "Date of Birth: " + dob_day + "/" + dob_month + "/" + dob_year;

                document.getElementById("customer_info").innerHTML = customer_info;
            }
        </script>
        <script>
            var customer_type=["Regular", "VIP", "Potential", "Lựu Đạn"];
        </script>
    </head>
    <body>
        <form name="customer_form">
            <table>
                <tr>
                    <td>Customer Name:</td>
                    <td>
                        <input type="text" name="customer_name" id="customer_name">
                    </td>
                </tr>
                <tr>
                    <td>Address:</td>
                    <td>
                        <input type="text" name="customer_address" id="customer_address">
                    </td>
                </tr>
                <tr>
                    <td>Phone Number:</td>
                    <td>
                        <input type="text" name="customer_phone" id="customer_phone">
                    </td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td>
                        <input type="text" name="customer_email" id="customer_email">
                    </td>
                </tr>
                <tr>
                    <td>Date of Birth:</td>
                    <td>
                        <select name="dob_day" id="dob_day"></select>
                        <select name="dob_month" id="dob_month"></select>
                        <select name="dob_year" id="dob_year"></select>
                    </td>
                </tr>
                <tr>
                    <td>Customer Type:</td>
                    <td>
                        <select name="customer_type" id="customer_type">

                        </select>
                    </td>
                </tr>
            </table>
            <button type="button" onclick="saveCustomerInfo()">Save</button>
            <div id="customer_info" style="font-weight: bold; font-size: 20px;"></div>
        </form>
        <script>
            function load_date_for_birthday_selection()
            {
                var dob_day = document.getElementById("dob_day");
                var dob_month = document.getElementById("dob_month");
                var dob_year = document.getElementById("dob_year");
                for (var i = 1; i <= 31; i++) {
                    dob_day.innerHTML+="<option value='" + i + "'>" + i + "</option>";
                }
                for (var j = 1; j <= 12; j++) {
                    dob_month.innerHTML+="<option value='" + j + "'>" + j + "</option>";
                }
                for (var i=1965; i<=2015; i++) {
                    dob_year.innerHTML+="<option value='" + i + "'>" + i + "</option>";
                }
            }
            load_date_for_birthday_selection();
            function show_customer_type()
            {
                var customer_type_select = document.getElementById("customer_type");
                for (var i=0; i<customer_type.length; i++) {
                    customer_type_select.innerHTML+="<option value='" + customer_type[i] + "'>" + customer_type[i] + "</option>";
                }
            }
            show_customer_type();
        </script>
    </body>
</html>
