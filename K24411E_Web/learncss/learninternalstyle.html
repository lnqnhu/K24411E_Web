<html>
    <head>
        <title>Tiêu đề trang</title>
        <style type="text/css">
            h1, p{ 
                color:pink;
                font-style:italic;
            }
        </style>
    </head>
    <body>
        <h1>Nội dung trang</h1>
        <h1>Hello Hello</h1>
        <p>same h1 style</p>
        <h2>h2 không được định dạng theo style của h1</h2>
    </body>
</html>
<!-- h1, p gọi là selector, nghĩa là những cái đó được chọn để định dạng như trong cái style-->
<!-- ví dụ k có h2 thì ở dưới h2 k dc định dạng theo cái style đó -->
