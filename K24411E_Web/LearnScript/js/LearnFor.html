<html>
    <head>
        <title>Tiêu đề trang</title>
    </head>
    <body>
        <p id="myparagraph">Test 0</p>
        <h3 id="mylist"></h3>
        <script type="text/javascript">
        var mylist = document.getElementById("mylist");
        for(var i=1; i<=100; i++)
        {
            mylist.innerHTML += i + "<br/>";
        }
        var myparagraph = document.getElementById("myparagraph");
        myparagraph.innerText = "Tổng cộng: 100 phần tử";
        </script>
    </body>
    
</html>
