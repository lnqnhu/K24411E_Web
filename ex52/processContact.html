<html>
    <head>
        <title>Process Contact - Ex52</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            .data-container {
                border: 1px solid #ccc;
                padding: 15px;
                background-color: #f9f9f9;
                border-radius: 5px;
                max-width: 600px;
            }
            .data-item {
                margin: 10px 0;
            }
            .label {
                font-weight: bold;
                color: #333;
            }
            .value {
                color: #666;
                margin-left: 10px;
            }
            a {
                display: inline-block;
                margin-top: 20px;
                padding: 8px 15px;
                background-color: #4CAF50;
                color: white;
                text-decoration: none;
                border-radius: 4px;
            }
            a:hover {
                background-color: #45a049;
            }
        </style>
    </head>
    <body>
        <h2>Contact Information Received</h2>
        <div class="data-container">
            <div class="data-item">
                <span class="label">Full Name:</span>
                <span class="value" id="fullname"></span>
            </div>
            <div class="data-item">
                <span class="label">Email:</span>
                <span class="value" id="email"></span>
            </div>
            <div class="data-item">
                <span class="label">Send to:</span>
                <span class="value" id="sendto"></span>
            </div>
            <div class="data-item">
                <span class="label">Title:</span>
                <span class="value" id="title"></span>
            </div>
            <div class="data-item">
                <span class="label">Content:</span>
                <span class="value" id="content"></span>
            </div>
        </div>
        <br>
        <a href="Contact.html">Back to Contact Form</a>

        <script>
            // Get URL parameters from GET request
            function getUrlParameter(name) {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                var results = regex.exec(location.search);
                return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
            }

            // Display the received data
            document.getElementById('fullname').textContent = getUrlParameter('fullname') || '(Not provided)';
            document.getElementById('email').textContent = getUrlParameter('email') || '(Not provided)';
            document.getElementById('sendto').textContent = getUrlParameter('sendto') || '(Not provided)';
            document.getElementById('title').textContent = getUrlParameter('title') || '(Not provided)';
            document.getElementById('content').textContent = getUrlParameter('content') || '(Not provided)';
        </script>
    </body>
</html>
